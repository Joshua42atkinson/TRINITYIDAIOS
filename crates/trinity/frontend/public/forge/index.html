<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Trinity Forge Studio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    
    /* Bevy canvas fills the entire iframe */
    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
      outline: none;
    }
    
    /* Loading overlay */
    #forge-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a1a 100%);
      color: #b8c0ff;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      z-index: 100;
      transition: opacity 0.6s ease;
    }
    
    #forge-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .forge-logo {
      font-size: 48px;
      margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .forge-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    
    .forge-subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 24px;
    }
    
    .forge-progress {
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    
    .forge-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
      border-radius: 2px;
      transition: width 0.3s ease;
      animation: loading 3s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    @keyframes loading {
      0% { width: 5%; }
      50% { width: 70%; }
      100% { width: 95%; }
    }
    
    /* Error state */
    .forge-error {
      color: #f87171;
      font-size: 14px;
      margin-top: 16px;
      text-align: center;
      max-width: 300px;
    }
    
    /* Standby state - when WASM isn't built yet */
    .forge-standby {
      text-align: center;
    }
    
    .forge-standby-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin: 24px 0;
      max-width: 280px;
    }
    
    .forge-standby-cell {
      width: 60px;
      height: 60px;
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: all 0.3s ease;
    }
    
    .forge-standby-cell:hover {
      background: rgba(99,102,241,0.15);
      border-color: rgba(99,102,241,0.3);
      transform: translateY(-2px);
    }
    
    .forge-status {
      font-size: 12px;
      color: #4b5563;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div id="forge-loading">
    <div class="forge-standby">
      <div class="forge-logo">⚒️</div>
      <div class="forge-title">FORGE STUDIO</div>
      <div class="forge-subtitle">AI-Native Game Engine · Project Forge</div>
      
      <div class="forge-standby-grid">
        <div class="forge-standby-cell" title="Scene">🏔️</div>
        <div class="forge-standby-cell" title="Physics">⚡</div>
        <div class="forge-standby-cell" title="Materials">🎨</div>
        <div class="forge-standby-cell" title="Animation">🎬</div>
        <div class="forge-standby-cell" title="Audio">🔊</div>
        <div class="forge-standby-cell" title="Sprites">🖼️</div>
        <div class="forge-standby-cell" title="Scripting">📜</div>
        <div class="forge-standby-cell" title="Export">📦</div>
      </div>
      
      <div class="forge-progress">
        <div class="forge-progress-bar" id="progress-bar"></div>
      </div>
      
      <div class="forge-status" id="forge-status">
        Waiting for WASM engine…
      </div>
    </div>
  </div>

  <script type="module">
    // ═══════════════════════════════════════════════════════════════════
    // TRINITY ↔ FORGE Bridge (postMessage protocol)
    //
    // Trinity sends:   { type: 'forge_command', command: '...', payload: {} }
    // Forge responds:  { type: 'forge_result',  success: true/false, ... }
    //
    // When the WASM engine loads, it replaces the loading screen
    // with the Bevy canvas. Until then, we show the standby screen.
    // ═══════════════════════════════════════════════════════════════════
    
    const statusEl = document.getElementById('forge-status');
    const loadingEl = document.getElementById('forge-loading');
    const progressBar = document.getElementById('progress-bar');
    
    // Command queue — stores commands received before engine is ready
    let commandQueue = [];
    let engineReady = false;
    
    // Listen for commands from parent (Trinity ArtStudio.jsx)  
    window.addEventListener('message', (event) => {
      // Only accept messages from same origin (Trinity)
      if (event.origin !== window.location.origin) return;
      
      const { type, command, payload, requestId } = event.data || {};
      
      if (type === 'forge_command') {
        if (engineReady) {
          // Dispatch to Forge engine
          executeForgeCommand(command, payload, requestId);
        } else {
          // Queue for when engine loads
          commandQueue.push({ command, payload, requestId });
          statusEl.textContent = `Queued: ${command} (engine loading…)`;
        }
      }
      
      if (type === 'forge_ping') {
        // Trinity checking if Forge is alive
        window.parent.postMessage({
          type: 'forge_pong',
          engineReady,
          queuedCommands: commandQueue.length,
        }, '*');
      }
    });
    
    // Execute a Forge command via the WASM bridge
    function executeForgeCommand(command, payload, requestId) {
      try {
        // This calls into the Forge WASM module
        // The function is exposed by wasm-bindgen
        if (window.__forge_dispatch) {
          const result = window.__forge_dispatch(command, JSON.stringify(payload || {}));
          window.parent.postMessage({
            type: 'forge_result',
            requestId,
            success: true,
            data: JSON.parse(result || '{}'),
          }, '*');
        } else {
          throw new Error('Forge dispatch not available');
        }
      } catch (err) {
        window.parent.postMessage({
          type: 'forge_result',
          requestId,
          success: false,
          error: err.message,
        }, '*');
      }
    }
    
    // Try to load the WASM engine
    async function initForge() {
      try {
        statusEl.textContent = 'Loading WASM engine…';
        progressBar.style.width = '20%';
        
        // Try WebGL2 first (wider support), fall back to WebGPU
        const variants = [
          './engine-pkg-webgl2/forge_engine.js',
          './engine-pkg-webgpu/forge_engine.js',
        ];
        
        let loaded = false;
        for (const src of variants) {
          try {
            const module = await import(src);
            statusEl.textContent = 'Initializing Bevy…';
            progressBar.style.width = '60%';
            
            await module.default();
            
            // Engine loaded — hide loading screen
            engineReady = true;
            progressBar.style.width = '100%';
            statusEl.textContent = 'Engine ready!';
            
            setTimeout(() => {
              loadingEl.classList.add('hidden');
            }, 500);
            
            // Flush queued commands
            for (const cmd of commandQueue) {
              executeForgeCommand(cmd.command, cmd.payload, cmd.requestId);
            }
            commandQueue = [];
            
            // Notify parent
            window.parent.postMessage({
              type: 'forge_ready',
              variant: src.includes('webgpu') ? 'webgpu' : 'webgl2',
            }, '*');
            
            loaded = true;
            break;
          } catch (e) {
            console.warn(`Failed to load ${src}:`, e);
          }
        }
        
        if (!loaded) {
          // WASM not built yet — show standby screen
          statusEl.textContent = 'WASM engine not built yet — use standby mode';
          progressBar.style.animation = 'none';
          progressBar.style.width = '0%';
          
          // Notify parent we're in standby
          window.parent.postMessage({
            type: 'forge_standby',
            message: 'WASM engine not built. Run: cd vendor/project-forge && bash build_wasm.sh',
          }, '*');
        }
      } catch (err) {
        statusEl.textContent = `Error: ${err.message}`;
        console.error('Forge init failed:', err);
      }
    }
    
    // Boot
    initForge();
  </script>
</body>
</html>
