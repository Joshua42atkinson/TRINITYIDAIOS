# ═══════════════════════════════════════════════════════════════════════════════
# Trinity ID AI OS — Runtime Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# INFERENCE ARCHITECTURE (April 8, 2026 — P.A.R.T.Y. Framework):
#   SGLang (8010): LongCat-Next 74B MoE — Pete (P). Instructional Designer + Great Recycler.
#                  Parallel 2 KV cache (2× 156K MLA). Handles Socratic, narrative, DiNA images.
#   vLLM  (8000): A.R.T.Y. Hub — Aesthetics (FLUX/CogVideoX/TripoSR), Research (embeddings),
#                  Tempo (Acestep 1.5 audio), Yardmaster (Qwen3-Coder REAP).
#
# The InferenceRouter auto-detects backends on startup.
# Set LLM_URL env var to override with a specific endpoint.
# ═══════════════════════════════════════════════════════════════════════════════

[node]
type = "Auto"  # Auto-detect Brain/Body

[inference]
primary = "longcat-omni"
auto_detect = true
ctx_size = 131072
max_tokens = 16384

# ── Pete (SGLang GPU — LongCat-Next 74B MoE) ──
# Pete IS the Great Recycler. Instructional designer, DM, narrator.
# Served by FastAPI sidecar inside sglang-engine distrobox container
# Capabilities: text, image_generation (DiNA), tts (CosyVoice), audio_understanding

[inference.backends.longcat-omni]
url = "http://127.0.0.1:8010"
supports_tools = true
supports_vision = true

# ── Yardmaster (Y) — Qwen3-Coder REAP via vLLM ──
# Part of the A.R.T.Y. Hub on port 8000
# The engineer that Pete is NOT. Writes Rust, builds React, runs cargo check.
# Not yet serving — start vLLM on 8000 when ready

[inference.backends.yardmaster-reap]
url = "http://127.0.0.1:8000"
supports_tools = true
supports_vision = false


[model]
model_dir = "~/trinity-models/sglang/LongCat-Next"
default_model = "LongCat-Next-74B-MoE-NF4"
n_gpu_layers = -1  # Full offload
context_size = 131072
batch_size = 512
n_threads = 16

[creative]
# ComfyUI deprecated — LongCat DiNA handles image generation natively
# comfyui_url = "http://127.0.0.1:8188"  # ARCHIVED
longcat_image_url = "http://127.0.0.1:8010/v1/images/generations"
longcat_tts_url = "http://127.0.0.1:8010/tts"
musicgpt_url = "http://127.0.0.1:8189"
hunyuan3d_url = "http://127.0.0.1:7860"
auto_launch = false

[memory]
vector_store_path = "~/.trinity/vectors"
embedding_dim = 384
max_recall = 20

[network]
listen_addr = "0.0.0.0:3000"

[hardware]
auto_detect = true
