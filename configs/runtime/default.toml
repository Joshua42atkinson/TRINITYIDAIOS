# ═══════════════════════════════════════════════════════════════════════════════
# Trinity ID AI OS — Runtime Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# INFERENCE ARCHITECTURE (April 9, 2026 — P.A.R.T.Y. Framework):
#   SGLang (8010): LongCat-Next 74B MoE — Pete (P). Instructional Designer + Great Recycler.
#                  Parallel 2 KV cache (2× 156K MLA). Handles Socratic, narrative, DiNA images,
#                  CosyVoice TTS, Acestep 1.5 audio/music generation.
#   vLLM  (8000): A.R.T.Y. Hub — FastAPI reverse proxy routing to:
#                  R: nomic-embed-text-v1.5-AWQ (port 8005) — RAG semantic embeddings
#                  Y: Yardmaster/Qwen REAP (port 8009) — coding subagent (optional)
#                  A: FLUX/CogVideoX/TripoSR (ports 8004/8006/8007) — creative models (optional)
#                  T: ACE-Step (port 8008) — music generation (optional)
#
# The InferenceRouter auto-detects backends on startup.
# Set LLM_URL env var to override with a specific endpoint.
# ═══════════════════════════════════════════════════════════════════════════════

[node]
type = "Auto"  # Auto-detect Brain/Body

[inference]
primary = "step-flash-reap"
auto_detect = true
ctx_size = 131072
max_tokens = 16384

# ── Pete (vLLM / LM Studio — Step-3.5-Flash-REAP-121B) ──
# Pete IS the Great Recycler. Instructional designer, DM, narrator.
# Replaces the legacy LongCat-Next MoE engine.
# Capabilities: text, reasoning, pedagogy. Unmatched cognitive capability.

[inference.backends.step-flash-reap]
url = "http://127.0.0.1:8000"
supports_tools = true
supports_vision = false

# ── Aesthetics (LM Studio / vLLM — Janus-Pro-7B) ──
# Multimodal / Vision fallback for the A.R.T.Y framework.
[inference.backends.janus-pro]
url = "http://127.0.0.1:1234"
supports_tools = false
supports_vision = true

# ── A.R.T.Y. Hub (vLLM reverse proxy) ──
# Routes to downstream vLLM instances for embeddings, coding, creative
# Start via: ./scripts/launch/launch_arty_hub.sh

[inference.backends.arty-hub]
url = "http://127.0.0.1:8000"
supports_tools = false
supports_vision = false

# ── Yardmaster (Y) — Qwen REAP via vLLM ──
# Part of the A.R.T.Y. Hub, routed through port 8000 to port 8009
# The engineer that Pete is NOT. Writes Rust, builds React, runs cargo check.
# Not yet serving — add model to launch_arty_hub.sh when ready

[inference.backends.yardmaster-reap]
url = "http://127.0.0.1:8000"
supports_tools = true
supports_vision = false


[model]
model_dir = "~/trinity-models/sglang/LongCat-Next"
default_model = "LongCat-Next-74B-MoE-NF4"
n_gpu_layers = -1  # Full offload
context_size = 131072
batch_size = 512
n_threads = 16

[creative]
# LongCat DiNA handles image generation natively on port 8010
longcat_image_url = "http://127.0.0.1:8010/v1/images/generations"
longcat_tts_url = "http://127.0.0.1:8010/tts"
longcat_audio_url = "http://127.0.0.1:8010/v1/audio/generations"
# Legacy creative sidecars (optional, managed by A.R.T.Y. Hub)
# flux_url = "http://127.0.0.1:8000"      # Routed via A.R.T.Y. → 8004
# cogvideo_url = "http://127.0.0.1:8000"   # Routed via A.R.T.Y. → 8006
hunyuan3d_url = "http://127.0.0.1:7860"
auto_launch = false

[memory]
vector_store_path = "~/.trinity/vectors"
embedding_model = "nomic-embed-text-v1.5-AWQ"
embedding_url = "http://127.0.0.1:8000/v1/embeddings"
embedding_dim = 768
max_recall = 20

[network]
listen_addr = "0.0.0.0:3000"

[hardware]
auto_detect = true
