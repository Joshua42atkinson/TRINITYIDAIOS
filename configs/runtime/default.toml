# ═══════════════════════════════════════════════════════════════════════════════
# Trinity ID AI OS — Runtime Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# INFERENCE ARCHITECTURE (April 2026):
#   vLLM Omni — exclusive inference backend (ROCm GPU, distrobox)
#   Single brain: Gemma-4 31B Dense AWQ on port 8001
#   Pete and Great Recycler are system-prompt personas, not separate models.
#
# The InferenceRouter auto-detects vLLM on startup.
# Set LLM_URL env var to override with a specific endpoint.
# ═══════════════════════════════════════════════════════════════════════════════

[node]
type = "Auto"  # Auto-detect Brain/Body

[inference]
primary = "vllm-recycler"
auto_detect = true
ctx_size = 32768
max_tokens = 16384

# ── vLLM Omni Backends (exclusive) ──

[inference.backends.vllm-recycler]
url = "http://127.0.0.1:8001"
supports_tools = true
supports_vision = true

[inference.backends.vllm-pete]
url = "http://127.0.0.1:8002"
supports_tools = true
supports_vision = false

[inference.backends.vllm-omni]
url = "http://127.0.0.1:8003"
supports_tools = false
supports_vision = true



[model]
model_dir = "~/trinity-models/vllm"
default_model = "gemma-4-31B-it-AWQ-4bit"
n_gpu_layers = -1  # Full offload
context_size = 32768
batch_size = 512
n_threads = 16

[creative]
# ComfyUI deprecated — vLLM Omni handles image generation natively
# comfyui_url = "http://127.0.0.1:8188"  # ARCHIVED: use vLLM /v1/images/generations
musicgpt_url = "http://127.0.0.1:8189"
hunyuan3d_url = "http://127.0.0.1:7860"
auto_launch = false

[memory]
vector_store_path = "~/.trinity/vectors"
embedding_dim = 384
max_recall = 20

[network]
listen_addr = "0.0.0.0:3000"

[hardware]
auto_detect = true
