# ═══════════════════════════════════════════════════════════════════════════════
# TRINITY ID AI OS — Runtime Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
#   The TRINITY inference layer uses an agnostic architecture:
#
#   ═══ P — External Inference (LM Studio / Ollama / Cloud) ═══
#
#   P — Pete's Brain (Port 1234): LM Studio or any OpenAI-compatible server
#       Heavy reasoning, code generation, deep Socratic dialog.
#       User-managed — load whatever model fits your hardware.
#       LM Studio parallel=2 for inhale/exhale Great Recycler cycle.
#
#   ═══ ART — Embedded ORT Models (No Sidecar Required) ═══
#
#   A — Aesthetics: Janus Pro 7B ONNX (vision + images, ~4 GB)
#       + 4K upscaler (Real-ESRGAN ONNX, ~64 MB)
#
#   R — Research: all-MiniLM-L6-v2 ONNX (~90 MB)
#       RAG semantic search embeddings. Fully embedded via ort crate.
#
#   T — Tempo: Kokoro TTS ONNX (~338 MB)
#       Text-to-speech synthesis. Fully embedded via ort crate.
#
#   ★ — Story Model: Small (~3B) Opus-distilled ONNX (~1.5 GB)
#       Minimum viable brain for standalone mode.
#       Handles NPC dialog, narrative prose, Socratic questions.
#       Quantized with AMD Quark to INT4 ONNX.
#
#   ═══ Y — The User ═══
#
#   The Subject Matter Expert. Pete scaffolds, the user creates.
#
#   ═══ TIER SYSTEM ═══
#
#   Standalone: Trinity binary only (ORT models embedded)
#       → Runs anywhere. Story mode, Socratic chat, VAAM all work.
#
#   Enhanced: Trinity + LM Studio (or any OpenAI-compatible server)
#       → Full reasoning depth, overnight sessions, tool calling.
#
#   Server: Trinity + vLLM (Purdue institutional deployment)
#       → Multi-user, batched inference. See docs/archive/vllm_server_tier/
#
#   The InferenceRouter auto-detects backends on startup.
#   Set LLM_URL env var to override with a specific endpoint.
# ═══════════════════════════════════════════════════════════════════════════════

[node]
type = "Auto"  # Auto-detect Brain/Body

# ═══════════════════════════════════════════════════════════════════════════════
# INFERENCE — Agnostic P-ART-Y Model Routing
# ═══════════════════════════════════════════════════════════════════════════════

[inference]
primary = "lm-studio"
auto_detect = true
ctx_size = 131072
max_tokens = 16384

# ── P — LM Studio: Primary Inference (Always-On when available) ────────────
# The Signal Tower. User loads whatever model fits their hardware.
# LM Studio serves OpenAI-compatible API on port 1234.
# Recommended: parallel=2 for inhale/exhale Great Recycler cycle.

[inference.backends.lm-studio]
url = "http://127.0.0.1:1234"
supports_tools = true
supports_vision = true
party_role = "P"
always_resident = true

# ── Fallback: llama-server / Ollama ────────────────────────────────────────
# Any OpenAI-compatible server the user has running.
# "Lone Wolf" mode — single model handles all P-ART-Y roles.

[inference.backends.llama-server]
url = "http://127.0.0.1:8080"
supports_tools = true
supports_vision = true
party_role = "T"
always_resident = false

[inference.backends.ollama]
url = "http://127.0.0.1:11434"
supports_tools = true
supports_vision = false
party_role = "T"
always_resident = false

# ── Server Tier: vLLM (Purdue / Institutional) ────────────────────────────
# These backends are for multi-user server deployments.
# See docs/archive/vllm_server_tier/ for configuration details.
# Uncomment when deploying on server hardware.

# [inference.backends.tempo-e4b]
# url = "http://127.0.0.1:8001"
# supports_tools = true
# supports_vision = true
# party_role = "T"
# always_resident = true

# [inference.backends.pete-coder]
# url = "http://127.0.0.1:8000"
# supports_tools = true
# supports_vision = true
# party_role = "P"
# always_resident = false

# [inference.backends.recycler-dense]
# url = "http://127.0.0.1:8002"
# supports_tools = true
# supports_vision = false
# party_role = "R"
# always_resident = false

# [inference.backends.janus-pro]
# url = "http://127.0.0.1:8003"
# supports_tools = false
# supports_vision = true
# party_role = "A"
# always_resident = false

# ═══════════════════════════════════════════════════════════════════════════════
# MODEL — Embedded ORT Story Model (Minimum Viable Brain)
# ═══════════════════════════════════════════════════════════════════════════════

[model]
# Story model: small ONNX for standalone operation
# When LM Studio is available, this is bypassed in favor of the loaded model.
model_dir = "~/.trinity/models/story-engine"
default_model = "story-engine-3b-opus-int4"
n_gpu_layers = -1  # Full offload
context_size = 8192
batch_size = 512
n_threads = 4

# ═══════════════════════════════════════════════════════════════════════════════
# CREATIVE — Embedded ORT media pipeline
# ═══════════════════════════════════════════════════════════════════════════════

[creative]
# A — Aesthetics: Janus Pro 7B ONNX (embedded) + upscaler
# T — Tempo: Kokoro TTS ONNX (embedded)
# ComfyUI: External tool connected via MCP (user teaches themselves to use it)
flux_image_url = "embedded://ort/janus-pro-7b"
acestep_music_url = "http://127.0.0.1:8008/v1/audio/generations"
hunyuan3d_url = "http://127.0.0.1:7860"
auto_launch = false

# ═══════════════════════════════════════════════════════════════════════════════
# MEMORY — RAG vector store (embedded ORT)
# ═══════════════════════════════════════════════════════════════════════════════

[memory]
vector_store_path = "~/.trinity/vectors"
embedding_model = "all-MiniLM-L6-v2"
# Embedded ONNX via ort crate — no external dependency for embeddings
embedding_url = "embedded://ort/all-MiniLM-L6-v2"
embedding_dim = 384
max_recall = 20

[network]
listen_addr = "0.0.0.0:3000"

[hardware]
auto_detect = true
