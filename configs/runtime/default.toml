# ═══════════════════════════════════════════════════════════════════════════════
# Trinity ID AI OS — Runtime Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# INFERENCE ARCHITECTURE (April 2026):
#   Primary:  vLLM Omni sidecar (ROCm GPU) — unified LLM + vision + audio + images
#   Fallback: llama-server, LM Studio, Ollama, or any OpenAI-compatible server
#
# The InferenceRouter auto-detects servers on known ports at startup.
# Set LLM_URL env var to override with a specific endpoint.
# ═══════════════════════════════════════════════════════════════════════════════

[node]
type = "Auto"  # Auto-detect Brain/Body

[inference]
primary = "vllm-omni"
auto_detect = true
ctx_size = 262144
max_tokens = 16384

# Multi-agent architecture via vLLM multi-model serving:
# Great Recycler = orchestrator (large dense model, Socratic reasoning)
# Programmer Pete = sub-agent (fast coding model)
# ART Studio = sub-agent (image/creative model)
[inference.agents]
recycler_model = "default"   # Populated when Gemma 4 model is selected
pete_model = "default"       # Can be same model or specialized
art_model = "default"        # Image generation model

# ── Backends ──

[inference.backends.vllm-omni]
url = "http://127.0.0.1:8000"
supports_tools = true
supports_vision = true

[inference.backends.llama-server]
url = "http://127.0.0.1:8080"
supports_tools = true
supports_vision = true

[inference.backends.lm-studio]
url = "http://127.0.0.1:1234"
supports_tools = true
supports_vision = true

[inference.backends.ollama]
url = "http://127.0.0.1:11434"
supports_tools = true
supports_vision = false

[model]
model_dir = "~/trinity-models"
default_model = "Mistral-Small-4-119B-2603-Q4_K_M-00001-of-00002.gguf"
n_gpu_layers = -1  # Full offload
context_size = 262144
batch_size = 512
n_threads = 16

[creative]
comfyui_url = "http://127.0.0.1:8188"
musicgpt_url = "http://127.0.0.1:8189"
hunyuan3d_url = "http://127.0.0.1:7860"
auto_launch = false

[memory]
vector_store_path = "~/.trinity/vectors"
embedding_dim = 384
max_recall = 20

[network]
listen_addr = "0.0.0.0:3000"

[hardware]
auto_detect = true
