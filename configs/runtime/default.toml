# ═══════════════════════════════════════════════════════════════════════════════
# Trinity ID AI OS — Runtime Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# INFERENCE ARCHITECTURE (March 2026):
#   Primary:  Embedded llama-cpp-2 Rust FFI → Vulkan GPU (zero HTTP overhead)
#   Fallback: HTTP InferenceRouter → any OpenAI-compatible server
#
# To use embedded inference, set GGUF_MODEL_PATH env var to the model file.
# If no GGUF_MODEL_PATH is set, the router auto-detects servers on these ports.
# ═══════════════════════════════════════════════════════════════════════════════

[node]
type = "Auto"  # Auto-detect Brain/Body

[inference]
primary = "lm-studio"
auto_detect = true
ctx_size = 262144
max_tokens = 16384

# Duality KV Cache: dual slots for instant persona switching
# Slot 0 = Great Recycler (strategic planning, documentation)
# Slot 1 = Programmer Pete (execution, building, shipping)
[inference.slots]
parallel = 2
recycler_slot = 0
programmer_slot = 1

# ── Backends (HTTP fallback when embedded inference is not active) ──

[inference.backends.llama-server]
url = "http://127.0.0.1:8080"
supports_tools = true
supports_vision = true

[inference.backends.lm-studio]
url = "http://127.0.0.1:1234"
supports_tools = true
supports_vision = true

[inference.backends.ollama]
url = "http://127.0.0.1:11434"
supports_tools = true
supports_vision = false

[model]
model_dir = "~/trinity-models/gguf"
default_model = "Mistral-Small-4-119B-2603-Q4_K_M-00001-of-00002.gguf"
n_gpu_layers = -1  # Full offload
context_size = 262144
batch_size = 512
n_threads = 16

[creative]
comfyui_url = "http://127.0.0.1:8188"
musicgpt_url = "http://127.0.0.1:8189"
hunyuan3d_url = "http://127.0.0.1:7860"
auto_launch = false

[memory]
vector_store_path = "~/.trinity/vectors"
embedding_dim = 384
max_recall = 20

[network]
listen_addr = "0.0.0.0:3000"

[hardware]
auto_detect = true
