# Default Trinity Runtime Configuration

[node]
type = "Auto"  # Auto-detect Brain/Body

[inference]
primary = "vllm"
auto_detect = true
ctx_size = 262144
max_tokens = 16384

# Duality KV Cache: dual slots for instant persona switching
# Slot 0 = Great Recycler (strategic planning, documentation)
# Slot 1 = Programmer Pete (execution, building, shipping)
[inference.slots]
parallel = 2
recycler_slot = 0
programmer_slot = 1

[inference.backends.llama-server]
url = "http://127.0.0.1:8080"
supports_tools = true
supports_vision = true

[inference.backends.vllm]
url = "http://127.0.0.1:8000"
supports_tools = true
supports_vision = true

[inference.backends.ollama]
url = "http://127.0.0.1:11434"
supports_tools = true
supports_vision = false

[inference.backends.lm-studio]
url = "http://127.0.0.1:1234"
supports_tools = false
supports_vision = false

[inference.backends.sglang]
url = "http://127.0.0.1:8000"
supports_tools = true
supports_vision = false

# Qianfan-OCR Researcher sub-agent (4B vision model)
[inference.backends.researcher]
url = "http://127.0.0.1:8081"
supports_tools = false
supports_vision = true

[model]
model_dir = "~/trinity-models/gguf"
default_model = "Mistral-Small-4-119B-2603-Q4_K_M-00001-of-00002.gguf"
n_gpu_layers = -1  # Full offload
context_size = 262144
batch_size = 512
n_threads = 16

[model.researcher]
model_dir = "~/trinity-models/gguf"
model_file = "Qianfan-OCR-Q4_K_M.gguf"
port = 8081
context_size = 32768

[creative]
comfyui_url = "http://127.0.0.1:8188"
musicgpt_url = "http://127.0.0.1:8189"
hunyuan3d_url = "http://127.0.0.1:7860"
auto_launch = false

[memory]
vector_store_path = "~/.trinity/vectors"
embedding_dim = 384
max_recall = 20

[network]
listen_addr = "0.0.0.0:3000"

[hardware]
auto_detect = true
